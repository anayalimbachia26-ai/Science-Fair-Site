<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbon Footprint Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #2d5a3d 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 20px;
        }

        header .badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e5e7eb;
        }

        .card-icon {
            font-size: 1.8rem;
            margin-right: 12px;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1a472a;
        }

        .slider-group {
            margin-bottom: 24px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .slider-label {
            font-weight: 500;
            color: #333;
        }

        .slider-value {
            font-weight: 600;
            color: #2d5a3d;
            font-size: 1rem;
        }

        .slider-unit {
            font-size: 0.85rem;
            opacity: 0.7;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(to right, #2d5a3d 0%, #2d5a3d var(--pct), #e5e7eb var(--pct), #e5e7eb 100%);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #2d5a3d;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(45, 90, 61, 0.3);
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #2d5a3d;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 8px rgba(45, 90, 61, 0.3);
        }

        .slider-minmax {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #999;
            margin-top: 4px;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        select:focus {
            outline: none;
            border-color: #2d5a3d;
            box-shadow: 0 0 0 3px rgba(45, 90, 61, 0.1);
        }

        select option {
            padding: 8px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        button {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-calculate {
            background: linear-gradient(135deg, #2d5a3d, #1a472a);
            color: white;
        }

        .btn-calculate:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(45, 90, 61, 0.3);
        }

        .btn-calculate:active {
            transform: translateY(0);
        }

        .btn-reset {
            background: #f3f4f6;
            color: #333;
            border: 2px solid #e5e7eb;
        }

        .btn-reset:hover {
            background: #e5e7eb;
        }

        .result-card {
            background: linear-gradient(135deg, #1a472a, #2d5a3d);
            color: white;
            padding: 32px;
            border-radius: 12px;
            margin-top: 20px;
            text-align: center;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-value {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .result-label {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ade80, #fbbf24);
            border-radius: 4px;
            animation: fillProgress 0.8s ease-out;
        }

        @keyframes fillProgress {
            from {
                width: 0;
            }
            to {
                width: var(--progress);
            }
        }

        .comparison {
            font-size: 0.95rem;
            opacity: 0.85;
            margin-top: 16px;
        }

        .comparison.above {
            color: #fca5a5;
        }

        .comparison.below {
            color: #86efac;
        }

        .ai-tips {
            background: white;
            padding: 24px;
            border-radius: 12px;
            margin-top: 20px;
            border-left: 4px solid #2d5a3d;
        }

        .ai-tips h3 {
            color: #1a472a;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ai-tips p {
            line-height: 1.6;
            color: #555;
            margin-bottom: 8px;
        }

        .ai-tips ol {
            margin-left: 20px;
            color: #555;
            line-height: 1.8;
        }

        .ai-tips li {
            margin-bottom: 12px;
        }

        .loading {
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .hidden {
            display: none;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="badge">Science Fair Project</div>
            <h1>Carbon Footprint Calculator</h1>
            <p class="subtitle">Discover your impact. Get AI-powered tips to reduce it.</p>
        </header>

        <!-- Transport Card -->
        <div class="card">
            <div class="card-header">
                <span class="card-icon">🚗</span>
                <h2 class="card-title">Transport</h2>
            </div>
            <div class="slider-group">
                <div class="slider-header">
                    <label class="slider-label">Car Travel</label>
                    <span class="slider-value"><span id="carValue">20</span> <span class="slider-unit">km/day</span></span>
                </div>
                <input type="range" id="carKm" min="0" max="100" value="20" style="--pct: 20%;">
                <div class="slider-minmax">
                    <span>0</span>
                    <span>100 km/day</span>
                </div>
            </div>

            <div class="slider-group">
                <div class="slider-header">
                    <label class="slider-label">Flights</label>
                    <span class="slider-value"><span id="flightValue">2</span> <span class="slider-unit">per year</span></span>
                </div>
                <input type="range" id="flights" min="0" max="20" value="2" style="--pct: 10%;">
                <div class="slider-minmax">
                    <span>0</span>
                    <span>20 per year</span>
                </div>
            </div>
        </div>

        <!-- Energy Card -->
        <div class="card">
            <div class="card-header">
                <span class="card-icon">⚡</span>
                <h2 class="card-title">Energy & Home</h2>
            </div>
            <div class="slider-group">
                <div class="slider-header">
                    <label class="slider-label">Monthly Electricity</label>
                    <span class="slider-value"><span id="electricityValue">150</span> <span class="slider-unit">kWh</span></span>
                </div>
                <input type="range" id="electricity" min="0" max="500" value="150" style="--pct: 30%;">
                <div class="slider-minmax">
                    <span>0</span>
                    <span>500 kWh</span>
                </div>
            </div>
        </div>

        <!-- Diet Card -->
        <div class="card">
            <div class="card-header">
                <span class="card-icon">🍽️</span>
                <h2 class="card-title">Diet</h2>
            </div>
            <div class="input-group">
                <label for="diet">Select your diet type:</label>
                <select id="diet">
                    <option value="vegan">Vegan</option>
                    <option value="vegetarian">Vegetarian</option>
                    <option value="occasional-meat" selected>Non-vegetarian (occasional)</option>
                    <option value="daily-meat">Non-vegetarian (daily meat)</option>
                </select>
            </div>
        </div>

        <!-- Calculate Button -->
        <div class="button-group">
            <button class="btn-calculate" onclick="calculate()">Calculate Footprint</button>
            <button class="btn-reset" onclick="reset()">Reset</button>
        </div>

        <!-- Result Card -->
        <div id="resultContainer" class="hidden">
            <div class="result-card">
                <div class="result-value"><span id="resultValue">0</span> tonnes</div>
                <div class="result-label">CO₂ per year</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div id="comparison" class="comparison"></div>
            </div>

            <!-- AI Tips -->
            <div class="ai-tips">
                <h3>💡 Personalized AI Tips</h3>
                <div id="aiTipsContent">
                    <p><span class="loading">⏳</span> Getting personalized tips...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GLOBAL_AVERAGE = 4.0;
        const GROQ_API_KEY = localStorage.getItem('groqApiKey') || ""; // Load from localStorage or use empty string

        // Diet CO2 values
        const DIET_CO2 = {
            "vegan": 1.0,
            "vegetarian": 1.5,
            "occasional-meat": 2.5,
            "daily-meat": 4.0
        };

        const DIET_LABELS = {
            "vegan": "Vegan",
            "vegetarian": "Vegetarian",
            "occasional-meat": "Non-vegetarian (occasional)",
            "daily-meat": "Non-vegetarian (daily meat)"
        };

        // Update slider values in real-time
        document.getElementById('carKm').addEventListener('input', (e) => {
            const val = e.target.value;
            document.getElementById('carValue').textContent = val;
            e.target.style.setProperty('--pct', (val / 100) * 100 + '%');
        });

        document.getElementById('flights').addEventListener('input', (e) => {
            const val = e.target.value;
            document.getElementById('flightValue').textContent = val;
            e.target.style.setProperty('--pct', (val / 20) * 100 + '%');
        });

        document.getElementById('electricity').addEventListener('input', (e) => {
            const val = e.target.value;
            document.getElementById('electricityValue').textContent = val;
            e.target.style.setProperty('--pct', (val / 500) * 100 + '%');
        });

        function calculate() {
            const carKm = parseFloat(document.getElementById('carKm').value);
            const flights = parseFloat(document.getElementById('flights').value);
            const electricity = parseFloat(document.getElementById('electricity').value);
            const diet = document.getElementById('diet').value;

            // Calculate CO2
            const carCO2 = carKm * 365 * 0.00021;
            const flightCO2 = flights * 0.5;
            const electricityCO2 = electricity * 12 * 0.00082;
            const dietCO2 = DIET_CO2[diet];

            const total = Math.round((carCO2 + flightCO2 + electricityCO2 + dietCO2) * 10) / 10;

            // Show result
            document.getElementById('resultValue').textContent = total;
            
            const progressPct = Math.min((total / (GLOBAL_AVERAGE * 2)) * 100, 100);
            const progressFill = document.getElementById('progressFill');
            progressFill.style.setProperty('--progress', progressPct + '%');

            // Show comparison
            const comparison = document.getElementById('comparison');
            if (total > GLOBAL_AVERAGE) {
                const excess = (total - GLOBAL_AVERAGE).toFixed(1);
                comparison.innerHTML = `⚠️ You're ${excess} tonnes above the global average (${GLOBAL_AVERAGE} tonnes)`;
                comparison.className = 'comparison above';
            } else {
                const savings = (GLOBAL_AVERAGE - total).toFixed(1);
                comparison.innerHTML = `✅ You're ${savings} tonnes below the global average (${GLOBAL_AVERAGE} tonnes)`;
                comparison.className = 'comparison below';
            }

            document.getElementById('resultContainer').classList.remove('hidden');

            // Fetch AI tips
            fetchAiTips(total, carKm, flights, electricity, diet);
        }

        async function fetchAiTips(total, carKm, flights, electricity, diet) {
            const tipsContent = document.getElementById('aiTipsContent');
            
            let apiKey = GROQ_API_KEY;
            
            if (!apiKey) {
                apiKey = prompt("To enable AI tips, enter your Groq API key from https://console.groq.com\n\n(Your key will be saved in browser only, not sent to any server)");
                if (!apiKey) {
                    tipsContent.innerHTML = `
                        <p><strong>AI Tips Disabled</strong></p>
                        <p>To enable personalized AI tips:</p>
                        <ol>
                            <li>Get a free Groq API key at <a href="https://console.groq.com" target="_blank">console.groq.com</a></li>
                            <li>Click "Calculate Footprint" and paste your API key when prompted</li>
                        </ol>
                    `;
                    return;
                }
                localStorage.setItem('groqApiKey', apiKey);
            }

            tipsContent.innerHTML = '<p><span class="loading">⏳</span> Getting personalized tips...</p>';

            const dietLabel = DIET_LABELS[diet];
            const prompt = `The user has a carbon footprint of ${total} tonnes CO₂ per year. They travel ${carKm} km by car daily, take ${flights} flights per year, use ${electricity} kWh electricity per month and follow a ${dietLabel} diet. Give exactly 3 short, specific, practical tips to reduce their carbon footprint. Format as a numbered list. Keep each tip under 2 sentences.`;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [{ role: "user", content: prompt }],
                        max_tokens: 300
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data?.error?.message || `HTTP ${response.status}`);
                }

                const tips = data?.choices?.[0]?.message?.content || "No tips generated";
                tipsContent.innerHTML = `<ol>${tips.split('\n').filter(line => line.trim()).map(line => `<li>${line.replace(/^\d+\.\s*/, '')}</li>`).join('')}</ol>`;
            } catch (err) {
                console.error("AI Tips Error:", err);
                tipsContent.innerHTML = `<p><strong>Could not load AI tips:</strong> ${err.message}</p>`;
            }
        }

        function reset() {
            document.getElementById('carKm').value = 20;
            document.getElementById('carValue').textContent = '20';
            document.getElementById('carKm').style.setProperty('--pct', '20%');

            document.getElementById('flights').value = 2;
            document.getElementById('flightValue').textContent = '2';
            document.getElementById('flights').style.setProperty('--pct', '10%');

            document.getElementById('electricity').value = 150;
            document.getElementById('electricityValue').textContent = '150';
            document.getElementById('electricity').style.setProperty('--pct', '30%');

            document.getElementById('diet').value = 'occasional-meat';

            document.getElementById('resultContainer').classList.add('hidden');
        }
    </script>
</body>
</html>
